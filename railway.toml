# Railway service config for the Les Retrouvailles app.
#
# Two-path build:
# - Preferred: Builder=Dockerfile in dashboard. Uses our multi-stage Dockerfile.
# - Fallback: if Builder=Railpack stays sticky, requirements.txt + the
#   startCommand below give Railpack enough to boot a working staging.
#
# Either way, the [deploy] startCommand below runs the full boot sequence
# so the deployed image always migrates, creates the cache table, and
# serves static via WhiteNoise.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Boot sequence: migrate -> create cache table (DB cache backend) ->
# collectstatic -> gunicorn. Each step idempotent and fast.
startCommand = "python manage.py migrate --noinput && python manage.py createcachetable && python manage.py collectstatic --noinput && gunicorn alumni.wsgi:application --bind 0.0.0.0:$PORT --workers ${WEB_CONCURRENCY:-2} --timeout ${GUNICORN_TIMEOUT:-60} --access-logfile - --error-logfile -"

# Healthcheck: /health bypasses basic-auth (BASIC_AUTH_BYPASS_PATHS) so
# Railway's probe can reach it without credentials.
healthcheckPath = "/health"
healthcheckTimeout = 30

restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
