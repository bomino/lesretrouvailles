# Railway service config for the Les Retrouvailles app.
#
# Build is locked to the multi-stage Dockerfile. Startup is handled by
# docker/entrypoint.sh (referenced as ENTRYPOINT in the Dockerfile),
# NOT by a startCommand override here — Railway runs startCommand in
# exec form (no shell), so chained commands and $PORT expansion break.
# entrypoint.sh is a real bash script and handles those correctly.

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# /health bypasses basic-auth via BASIC_AUTH_BYPASS_PATHS, so the probe
# can reach it without credentials. 60s gives migrations + cache-table
# creation room on a cold deploy.
healthcheckPath = "/health"
healthcheckTimeout = 60

restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
