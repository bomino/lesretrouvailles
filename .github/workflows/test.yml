name: tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: alumni
          POSTGRES_USER: alumni
          POSTGRES_PASSWORD: alumni
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U alumni" --health-interval 5s
          --health-timeout 3s --health-retries 5
    env:
      DATABASE_URL: postgres://alumni:alumni@localhost:5432/alumni
      SECRET_KEY: ci-secret-key-not-for-production-32chars
      DEBUG: "true"
      ALLOWED_HOSTS: localhost
      DJANGO_SETTINGS_MODULE: alumni.settings.dev
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: sudo apt-get update && sudo apt-get install -y gettext
      - run: pip install -e ".[dev]"
      - run: npm ci
      - run: npm run design:lint
      - run: npm run design:export
      - run: npm run css:build
      - run: ruff check .
      - run: ruff format --check .
      # App templates live under */templates/ — the old `djlint templates/`
      # scope missed every one of them. (core has no templates/ dir of its
      # own; its templates live under the project-level templates/core/.)
      - run: djlint templates/ members/templates/ cooptation/templates/ gestion/templates/ memoires/templates/ memoriam/templates/ aide/templates/ --check
      # The committed theme file must match a fresh export from DESIGN.md;
      # otherwise CI builds CSS from the export while the Docker image builds
      # it from the stale committed file, and token-derived styles silently
      # vanish in prod.
      - run: git diff --exit-code tailwind.theme.json
      - run: python manage.py compilemessages
      # Model/migration drift must not merge (Makefile's `make check`).
      - run: python manage.py check
      - run: python manage.py makemigrations --dry-run --check
      - run: pytest -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Dockerfile/.dockerignore regressions (a new app missing from the COPY
      # list, a directory excluded from the build context, a dependency in
      # pyproject but not in the image's pip list) only surfaced at Railway
      # deploy time. CI installs from pyproject, which masks them.
      - run: docker build -t retrouvailles:ci .
