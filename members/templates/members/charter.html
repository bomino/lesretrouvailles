{% extends "base.html" %}
{% load i18n %}
{% block extra_head %}<meta name="robots" content="noindex,nofollow">{% endblock %}
{% block title %}
    {% trans "Charte" %} v{{ charter_version }}
{% endblock %}
{% block content %}
    <div class="mx-auto max-w-2xl">
        <article class="prose prose-neutral max-w-none rounded-2xl bg-base-200 px-8 py-10 shadow-sm border border-secondary/10 prose-headings:font-semibold prose-headings:tracking-tight prose-h1:text-3xl prose-h1:mb-4 prose-h2:text-xl prose-h2:mt-8 prose-h2:mb-3 prose-p:text-base prose-p:leading-relaxed prose-strong:text-primary">
            {{ charter_html|safe }}
        </article>
        <form method="post"
              action="?next={{ next|urlencode }}"
              class="mt-6 flex justify-end">
            {% csrf_token %}
            <button type="submit"
                    class="rounded-lg bg-tertiary px-6 py-3 text-base font-medium text-on-tertiary shadow-sm hover:opacity-95 focus:outline-none focus:ring-2 focus:ring-tertiary/40 min-h-tap">
                {% trans "J'accepte" %}
            </button>
        </form>
    </div>
{% endblock %}
