{% if use_image %}
    <img src="{{ image_url }}"
         alt="{{ member.full_name }}"
         loading="lazy"
         width="{{ size }}"
         height="{{ size }}"
         class="avatar avatar-photo rounded-full">
{% else %}
    <div class="avatar avatar-initials inline-flex items-center justify-center rounded-full text-white font-semibold"
         style="background:hsl({{ hue }}, 55%, 45%);
                width:{{ size }}px;
                height:{{ size }}px;
                font-size:{% widthratio size 5 2 %}px"
         aria-label="{{ member.full_name }}">{{ initials }}</div>
{% endif %}
