repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.12
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: https://github.com/Riverside-Healthcare/djLint
    # Must match the djlint pin in pyproject.toml [dev] — CI runs
    # `djlint --check` with the pyproject version against files this hook
    # formatted, so a version skew fails the build.
    rev: v1.36.4
    hooks:
      - id: djlint-django
        args: [--reformat]
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
        args: [--maxkb=500]
